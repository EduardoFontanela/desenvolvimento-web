<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Cadastro</title>
</head>
<body>

    <h1>Página de Cadastro</h1>

    <form action="#" method="POST">
        <fieldset>
            <legend>Crie sua Conta</legend>

            <p>
                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome">
            </p>

            <p>
                <label for="email">E-mail:</label><br>
                <input type="email" id="email" name="email" placeholder="seuemail@dominio.com" required>
            </p>

            <p>
                <label for="senha">Senha (mínimo 8 caracteres):</label><br>
                <input type="password" id="senha" name="senha" minlength="8" required>
            </p>

            <p>
                <b>Gênero:</b><br><br>
                <input type="radio" id="feminino" name="genero" value="feminino">
                <label for="feminino">Feminino</label><br>
                
                <input type="radio" id="masculino" name="genero" value="masculino">
                <label for="masculino">Masculino</label><br>
                
                <input type="radio" id="outro" name="genero" value="outro">
                <label for="outro">Outro</label>
            </p>

            <p>
                <label for="biografia">Biografia:</label><br>
                <textarea id="biografia" name="biografia" placeholder="Fale um pouco sobre você..." rows="5" cols="30"></textarea>
            </p>

            <p>
                <input type="checkbox" id="termos" name="termos" required>
                <label for="termos">Eu li e aceito os termos de serviço.</label>
            </p>

        </fieldset>

        <p>
            <button type="submit">Cadastrar</button>
            <button type="reset">Limpar</button>
        </p>
    </form>

</body>
</html>
